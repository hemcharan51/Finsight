<svg viewBox="0 0 960 980" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="ttl dsc" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <title id="ttl">FinSight query-to-answer architecture</title>
  <desc id="dsc">A vertical pipeline: user query, then a built-once front half (ingest, chunk, numeric store, dual index), then decompose into a grid, then per-cell fan-out routed to three engines (numeric store with no LLM, retrieval-extract, or deterministic compute), then cross-cell verify and synthesize, producing a cited answer.</desc>
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#71717a"/>
    </marker>
    <style>
      .box{fill:#ffffff;stroke:#d4d4d8;stroke-width:1.5;}
      .soft{fill:#f4f4f5;stroke:#e4e4e7;stroke-width:1.2;}
      .t{fill:#18181b;font-size:13px;font-weight:650;}
      .s{fill:#71717a;font-size:10.5px;}
      .band{fill:#a1a1aa;font-size:10.5px;font-weight:700;letter-spacing:1.5px;}
      .num{fill:#a1a1aa;font-size:10px;font-weight:700;}
      .flow{stroke:#71717a;stroke-width:1.6;fill:none;}
      .hdr{fill:#71717a;font-size:9.5px;font-weight:700;}
    </style>
  </defs>

  <rect x="0" y="0" width="960" height="980" fill="#ffffff"/>

  <!-- USER QUERY -->
  <rect class="box" x="330" y="18" width="300" height="50" rx="10"/>
  <text class="t" x="480" y="40" text-anchor="middle">User query</text>
  <text class="s" x="480" y="56" text-anchor="middle">“Compare net margin &amp; debt-to-equity across filings”</text>
  <path class="flow" d="M480 68 L480 92" marker-end="url(#ah)"/>

  <!-- BUILT ONCE -->
  <rect class="soft" x="36" y="96" width="888" height="118" rx="12"/>
  <text class="band" x="52" y="116">BUILT ONCE PER CORPUS</text>
  <g>
    <rect class="box" x="52" y="128" width="196" height="68" rx="9"/>
    <text class="num" x="64" y="146">1</text>
    <text class="t" x="64" y="160">Ingest</text>
    <text class="s" x="64" y="177">txt · csv · pdf · docx</text>
    <text class="s" x="64" y="190">→ blocks + tables</text>

    <rect class="box" x="268" y="128" width="196" height="68" rx="9"/>
    <text class="num" x="280" y="146">2</text>
    <text class="t" x="280" y="160">Chunk</text>
    <text class="s" x="280" y="177">tables kept whole,</text>
    <text class="s" x="280" y="190">prose sliding window</text>

    <rect class="box" x="484" y="128" width="196" height="68" rx="9"/>
    <text class="num" x="496" y="146">3</text>
    <text class="t" x="496" y="160">Numeric store</text>
    <text class="s" x="496" y="177">regex figures keyed</text>
    <text class="s" x="496" y="190">by (doc, metric)</text>

    <rect class="box" x="700" y="128" width="196" height="68" rx="9"/>
    <text class="num" x="712" y="146">4</text>
    <text class="t" x="712" y="160">Dual index</text>
    <text class="s" x="712" y="177">BM25 + embeddings,</text>
    <text class="s" x="712" y="190">hard per-doc filter</text>
  </g>
  <path class="flow" d="M480 214 L480 238" marker-end="url(#ah)"/>

  <!-- DECOMPOSE -->
  <rect class="box" x="280" y="242" width="400" height="66" rx="10"/>
  <text class="num" x="296" y="262">5</text>
  <text class="t" x="296" y="266">Decompose · planner</text>
  <text class="s" x="296" y="283">question → grid:  rows = documents</text>
  <text class="s" x="296" y="297">× columns = scoped sub-questions  (LLM or heuristic)</text>
  <path class="flow" d="M480 308 L480 332" marker-end="url(#ah)"/>

  <!-- FAN OUT -->
  <rect class="soft" x="36" y="336" width="888" height="372" rx="12"/>
  <text class="band" x="52" y="358">6 · FAN-OUT — ONE CELL PER (DOCUMENT × SUB-QUESTION), ALL PARALLEL</text>
  <text class="s" x="52" y="374">concurrency semaphore · cell cache · retry · Wave 1 figures/text, then Wave 2 ratios</text>

  <!-- grid matrix -->
  <g transform="translate(52,392)">
    <text class="hdr" x="86" y="10" text-anchor="middle">revenue</text>
    <text class="hdr" x="170" y="10" text-anchor="middle">key risks</text>
    <text class="hdr" x="254" y="10" text-anchor="middle">net margin</text>
    <text class="hdr" x="44" y="10" text-anchor="middle">doc</text>
    <g font-size="10">
      <text class="s" x="8" y="38">Acme</text>
      <text class="s" x="8" y="74">Beta</text>
      <text class="s" x="8" y="110">Gamma</text>
      <rect x="48" y="22" width="76" height="26" rx="4" fill="#e8f0fb" stroke="#2b6cb0"/>
      <rect x="48" y="58" width="76" height="26" rx="4" fill="#e8f0fb" stroke="#2b6cb0"/>
      <rect x="48" y="94" width="76" height="26" rx="4" fill="#e8f0fb" stroke="#2b6cb0"/>
      <rect x="132" y="22" width="76" height="26" rx="4" fill="#fcefe3" stroke="#dd6b20"/>
      <rect x="132" y="58" width="76" height="26" rx="4" fill="#fcefe3" stroke="#dd6b20"/>
      <rect x="132" y="94" width="76" height="26" rx="4" fill="#fcefe3" stroke="#dd6b20"/>
      <rect x="216" y="22" width="76" height="26" rx="4" fill="#e6f2ec" stroke="#2f855a"/>
      <rect x="216" y="58" width="76" height="26" rx="4" fill="#e6f2ec" stroke="#2f855a"/>
      <rect x="216" y="94" width="76" height="26" rx="4" fill="#f4f4f5" stroke="#a1a1aa" stroke-dasharray="3 2"/>
      <text x="254" y="111" text-anchor="middle" fill="#a1a1aa" font-size="9">refused</text>
    </g>
    <text class="s" x="0" y="142">each cell = one document only → isolation + a single cited span</text>
  </g>

  <!-- route cards -->
  <g>
    <rect class="box" x="436" y="398" width="460" height="58" rx="9"/>
    <circle cx="456" cy="420" r="6" fill="#2b6cb0"/>
    <text class="t" x="472" y="418">numeric_store</text>
    <text class="s" x="472" y="433">pull a pre-extracted figure — <tspan font-weight="700" fill="#2b6cb0">NO LLM</tspan> (fast path)</text>
    <text class="s" x="472" y="447">used by the blue cells above</text>

    <rect class="box" x="436" y="466" width="460" height="58" rx="9"/>
    <circle cx="456" cy="488" r="6" fill="#dd6b20"/>
    <text class="t" x="472" y="486">retrieval_extract</text>
    <text class="s" x="472" y="501">RRF + rerank scoped to 1 doc → extract from the span</text>
    <text class="s" x="472" y="515">orange cells (numeric fallback &amp; qualitative text)</text>

    <rect class="box" x="436" y="534" width="460" height="64" rx="9"/>
    <circle cx="456" cy="558" r="6" fill="#2f855a"/>
    <text class="t" x="472" y="556">compute → deterministic calc engine</text>
    <text class="s" x="472" y="571">exact figures in → formula · inputs · result out</text>
    <text class="s" x="472" y="585"><tspan font-weight="700" fill="#2f855a">LLM never computes</tspan> · missing input ⇒ refused, never guessed</text>
  </g>

  <text class="s" x="52" y="690">A missing figure is returned empty / refused — never invented. Every filled cell traces to exactly one source span.</text>
  <path class="flow" d="M480 708 L480 732" marker-end="url(#ah)"/>

  <!-- VERIFY + SYNTH -->
  <rect class="box" x="60" y="736" width="392" height="64" rx="10"/>
  <text class="num" x="76" y="756">9</text>
  <text class="t" x="76" y="760">Verify · cross-cell</text>
  <text class="s" x="76" y="777">accounting identities · plausible ranges</text>
  <text class="s" x="76" y="791">citation match (stated value is in cited span)</text>

  <rect class="box" x="508" y="736" width="392" height="64" rx="10"/>
  <text class="num" x="524" y="756">9</text>
  <text class="t" x="524" y="760">Synthesize</text>
  <text class="s" x="524" y="777">cited narrative built from the grid</text>
  <text class="s" x="524" y="791">(LLM, or deterministic template offline)</text>
  <path class="flow" d="M452 768 L508 768" marker-end="url(#ah)"/>
  <path class="flow" d="M480 800 L480 824" marker-end="url(#ah)"/>

  <!-- ANSWER -->
  <rect class="box" x="316" y="828" width="328" height="68" rx="12" stroke-width="2"/>
  <text class="t" x="480" y="852" text-anchor="middle">Answer</text>
  <text class="s" x="480" y="869" text-anchor="middle">grid (full audit trail) + cited narrative</text>
  <text class="s" x="480" y="883" text-anchor="middle">with completion % and verification flags</text>
</svg>
